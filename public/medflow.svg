<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" fill="none">
  <!-- Background rounded square -->
  <rect width="44" height="44" rx="10" fill="url(#grad)"/>

  <!-- Activity-style EKG wave (same style as lucide-react Activity) -->
  <polyline
    points="4,22 10,22 13,14 16,30 19,10 22,34 25,22 32,22 35,17 38,27 40,22 44,22"
    stroke="white"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
  </defs>
</svg>
