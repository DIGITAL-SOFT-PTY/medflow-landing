<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/medflow.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow" />

    <!-- Primary SEO -->
    <title>MedFlow — Sistema de Gestión Clínica para Latinoamérica</title>
    <meta name="description" content="MedFlow digitaliza y automatiza tu clínica: pacientes, citas, cobros e historial clínico. 14 días gratis, sin tarjeta de crédito." />
    <link rel="canonical" href="https://medflow.com" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://medflow.com" />
    <meta property="og:title"       content="MedFlow — Gestión Clínica Inteligente" />
    <meta property="og:description" content="Digitaliza tu clínica en 5 minutos. Agenda, pacientes, cobros y reportes en un solo lugar. 500+ clínicas en Latinoamérica." />
    <meta property="og:image"       content="https://medflow.com/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"      content="es_PA" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="MedFlow — Gestión Clínica Inteligente" />
    <meta name="twitter:description" content="Digitaliza tu clínica en 5 minutos. 14 días gratis, sin tarjeta." />
    <meta name="twitter:image"       content="https://medflow.com/og-image.png" />

    <!-- JSON-LD Organization Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "MedFlow",
      "url": "https://medflow.com",
      "logo": "https://medflow.com/medflow.svg",
      "description": "Sistema de gestión clínica para médicos y clínicas de Latinoamérica.",
      "areaServed": "Latin America",
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+507-6277-4449",
        "contactType": "customer support",
        "availableLanguage": "Spanish"
      },
      "sameAs": []
    }
    </script>

    <!-- JSON-LD SoftwareApplication Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "MedFlow",
      "applicationCategory": "HealthApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "29",
        "priceCurrency": "USD",
        "priceValidUntil": "2025-12-31"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "reviewCount": "500"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
